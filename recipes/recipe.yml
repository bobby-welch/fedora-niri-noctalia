---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: fedora-niri-noctalia
description: A personal Fedora Atomic desktop image built around Niri and Noctalia.

base-image: ghcr.io/ublue-os/base-main
image-version: 44

modules:
  # Copy image-level configuration from files/system/ into the image root.
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      copr:
        - atim/starship

    install:
      packages:
        - 7zip
        - adw-gtk3-theme
        - age
        - alacritty
        - bat
        - bluez
        - brave-origin
        - brightnessctl
        - chezmoi
        - distrobox
        - fd-find
        - fish
        - fwupd
        - fzf
        - git
        - gnome-keyring
        - gnome-keyring-pam
        - google-noto-color-emoji-fonts
        - google-noto-sans-vf-fonts
        - google-noto-serif-vf-fonts
        - greetd
        - greetd-selinux
        - gvfs-archive
        - gvfs-fuse
        - gvfs-mtp
        - gvfs-smb
        - htop
        - nautilus
        - NetworkManager
        - NetworkManager-wifi
        - neovim
        - niri
        - noctalia
        - openssh-clients
        - pipewire
        - pipewire-pulseaudio
        - playerctl
        - podman
        - polkit
        - rclone
        - ripgrep
        - rsms-inter-fonts
        - starship
        - swayimg
        - Thunar
        - thunar-archive-plugin
        - thunar-volman
        - tmux
        - tuned-ppd
        - tuigreet
        - unzip
        - upower
        - wireplumber
        - wl-clipboard
        - xarchiver
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - xdg-utils
        - zip

    remove:
      packages:
        # base-main normally omits Firefox; remove it defensively in case that changes upstream.
        - firefox
        - firefox-langpacks

  - type: fonts
    fonts:
      nerd-fonts:
        - IosevkaTerm

  - type: systemd
    system:
      enabled:
        - greetd.service

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: user
        install:
          - io.github.lullabyX.sone
          - md.obsidian.Obsidian
          - org.gtk.Gtk3theme.adw-gtk3
          - org.gtk.Gtk3theme.adw-gtk3-dark
          - org.libreoffice.LibreOffice

  - type: signing
